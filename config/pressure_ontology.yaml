# Finance Crow Engine — domain mapping layer (NOT the sacred ontology)
# Canonical primitives: TRPR/ontology/packet_ontology.yaml
# Charter: TRPR/ontology/ONTOLOGY_CHARTER.md
# Rule: map local sensors → packet primitives; never redefine primitives here.

canonical_source: TRPR/ontology/packet_ontology.yaml
schema_version: "0.1.1"
domain: market

# Local sensor → sacred primitive / derived metric keys
mappings:
  rupture_pressure_score:
    primitive: magnitude
    packet_type: pressure
  B_s:
    primitive: compression
    packet_type: pressure
  macd_histogram:
    primitive: acceleration
    packet_type: signal
  T_a:
    derived_metric: transition_acceleration
    key: T_a
  T_a_norm:
    derived_metric: transition_acceleration
    key: T_a
  R_o:
    derived_metric: observer_resolution
    key: R_o
  T_v:
    derived_metric: visibility_horizon
    key: T_v
  LRP:
    derived_metric: latent_rupture_potential
    key: LRP
    note: baseline pressure-driven rupture risk
  LRP_adjusted:
    derived_metric: latent_rupture_potential
    key: LRP
    note: experimental restoration-adjusted sibling metric
  LRP_regime:
    regimes: stable | pressure_building | pre_rupture | rupture_imminent
  LRP_adjusted_regime:
    regimes: stable | pressure_building | pre_rupture | rupture_imminent
  F_r:
    derived_metric: restoring_field_strength
    key: F_r
  D_c:
    derived_metric: dissipation_capacity
    key: D_c
    primitive: dissipation
  D_r:
    note: local dissipation rate proxy (1 - D_c); distinct from D_c capacity
  dissipation_score:
    derived_metric: dissipation_capacity
    key: D_c
  restoration_ratio:
    derived_metric: restoring_field_strength
    key: F_r
    note: ratio of F_r to pressure load
  A_micro:
    derived_metric: oscillation_amplitude
    key: A_f
    note: capillary micro-oscillation amplitude (not attractor field)
  A_field:
    note: local attractor field strength; maps to equilibrium attractor packets
  wave_persistence:
    primitive: coherence
    packet_type: signal
  C_w:
    derived_metric: capillary_wave_score
    key: C_w
  capillary_wave_score:
    derived_metric: capillary_wave_score
    key: C_w
  capillary_wave_regime:
    note: FLAT_SURFACE | CAPILLARY_ACTIVITY | SURFACE_TENSION_STRESS | PRE_RUPTURE
  capillary_absorption_state:
    note: cross-link to capillary_engine macro absorption
  H_s:
    note: maps historical_stress_memory to hysteresis retention
  O_i:
    note: maps observer_feedback_score to observer interference
  E_sys:
    note: maps entropy_score to system entropy
  IDI:
    derived_metric: inward_drift_index
    key: IDI
  equilibrium_field_strength:
    packet_example: vwap_attractor_packet
    domain: market
  gamma_attractor_strength:
    packet_example: gamma_flip_packet
    domain: market
  wall_pinning_strength:
    packet_example: gamma_flip_packet
    domain: market
  deviation_from_equilibrium:
    packet_example: vwap_attractor_packet
    domain: market
  historical_stress_memory:
    primitive: recursion
    packet_type: pressure
  recursive_pressure_carryover:
    primitive: recursion
    packet_type: pressure
  post_stress_sensitivity:
    primitive: recursion
    packet_type: pressure
  entropy_score:
    note: local E_sys proxy
  observer_feedback_score:
    note: local O_i proxy
  effective_pressure:
    derived_metric: latent_rupture_potential
    key: LRP
    note: pressure adjusted for observer blindspot
  field_regime:
    named_regimes: RESTORED_EQUILIBRIUM | ACTIVE_COMPENSATION | WEAKENING_RESTORATION | CAPILLARY_PRE_RUPTURE | ENTROPIC_DEGRADATION
  gamma_flip:
    packet_example: gamma_flip_packet
    domain: market
  vwap_distance_pct:
    packet_example: vwap_attractor_packet
    domain: market
  cvd_imbalance:
    packet_example: cvd_force_packet
    domain: market
  volume_injection:
    packet_type: liquidity
    primitive: dissipation

alerts:
  OBSERVABILITY_DECAY_ACCELERATING: observability_decay_accelerating
  COHERENCE_LOSS_ACCELERATING: coherence_loss_accelerating
  GAMMA_BOUNDARY_APPROACHING: compression_rising
  VWAP_DISLOCATION_EXPANDING: compression_rising
  PRESSURE_ACCELERATION_POSITIVE: compression_rising
  RUPTURE_IMMINENT_LRP: rupture_imminent_lrp
  RESTORATION_FAILURE_LRP_ADJUSTED: rupture_imminent_lrp
  WEAKENING_RESTORATION: weakening_restoration
  CAPILLARY_PRE_RUPTURE: capillary_pre_rupture
  ENTROPIC_DEGRADATION: entropic_degradation

notes:
  cvd: >
    CVD in this stack is a signed-volume proxy (close-direction × volume),
    not tick-true cumulative volume delta.
  philosophy: >
    Complex systems do not fail equally for all observers.
    The system changes before most observers are capable of perceiving the change.
  capillary_layers: >
    capillary_engine.py = macro/mid absorption from CanopyEnto CSV.
    capillary_wave_engine.py = local oscillatory instability near boundary.
  physics_engines: >
    restoration_field_engine, capillary_wave_engine, attractor_engine,
    hysteresis_engine, entropy_engine, observer_feedback_engine, inward_drift_engine,
    elastic_rebound_engine map inward via pressure_field_physics; LRP_adjusted closes the loop.
  elastic_rebound:
    elastic_strain_score:
      note: locked-fault strain proxy near gamma boundaries
    gamma_rebound_regime:
      note: LOCKED_FAULT | COMPRESSING_STRAIN | PRE_RUPTURE | REBOUND_RELEASE | AFTERSHOCK_REPRICING | NEW_EQUILIBRIUM
    hidden_reservoir_pressure:
      primitive: recursion
      note: deferred pressure when dissipation fails
    pressure_relocation_ratio:
      note: relocated vs eliminated pressure fraction
    false_stability_flag:
      derived_metric: observer_resolution
      note: visible stability with rising hidden strain
    observability_gap_score:
      derived_metric: observer_resolution
      key: R_o

  laser_falcon:
    iv_pressure_score:
      note: ATM IV pressure mapped to local magnitude proxy
    skew_instability_score:
      note: wing skew / inversion instability
    surface_dislocation_score:
      note: sparse or dislocated IV surface
    vol_reversion_pressure:
      note: OU mean-reversion workload after shock
    option_liquidity_risk:
      note: quote spread / IV coverage liquidity risk
    gamma_compression_score:
      note: maps inward to B_s (boundary_stress_frequency proxy)
    volatility_expansion_score:
      note: ATM IV / realized vol; maps inward to E_i proxy
    skew_asymmetry_pressure:
      note: (put_wing - call_wing) / ATM; LRP contributor
    dealer_hedging_stress_score:
      note: sum(gamma * OI); rupture_pressure contributor
    energy_injection_proxy:
      derived_metric: energy_injection_rate
      note: local E_i bridge from vol expansion
    boundary_stress_proxy:
      primitive: compression
      note: local B_s bridge from gamma compression
    rupture_pressure_contributor:
      note: dealer + skew stress contributor
    lrp_contributor:
      derived_metric: latent_rupture_potential
      key: LRP
      note: options-flow LRP contributor
    observer_blindspot_proxy:
      derived_metric: observer_resolution
      key: R_o
      note: vol surface distortion observer gap
  anomaly_detection:
    labels: NORMAL | POST_EVENT_EXPANSION | IPO_INSTABILITY | GAMMA_COMPRESSION_EVENT | CALL_FOMO_DETECTED | DEALER_STRESS_EVENT
  vol_regime:
    labels: LOW_VOL_REGIME | HIGH_VOL_REGIME | PANIC_REGIME | POST_EVENT_CRUSH | MELT_UP | MEAN_REVERSION_LIKELY
